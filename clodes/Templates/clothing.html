<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <title>Clothes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .clothing-item {
            border-bottom: 1px solid #ddd;
            padding: 10px 0;
        }
        .clothing-item:last-child {
            border-bottom: none;
        }
        .clothing-item h2 {
            margin: 0;
            color: #555;
        }
        .clothing-item p {
            margin: 5px 0;
            color: #777;
        }
        .clothing-item img {
            max-width: 100px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CLOTHES</h1>

        <div class="clothing-item">
            <h2>Red Sweater</h2>
            <p>Category: Outerwear</p>
            <p>Color: Red</p>
            <p>Size: M</p>
            <p>Material: Wool</p>
            <p>Price: $49.99</p>


        </div>

        <div class="clothing-item">
            <h2>Blue Jeans</h2>
            <p>Category: Bottom</p>
            <p>Color: Blue</p>
            <p>Size: 32</p>
            <p>Material: Denim</p>
            <p>Price: $59.99</p>


        </div>

    </div>

</body>
</html>
